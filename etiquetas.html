<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Etiquetas</title>

    <style>
        @page {
            size: A4;
            margin: 10mm;
        }

        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: #eaeaea;
        }

        .pagina-a4 {
            width: 210mm;
            min-height: 297mm;
            margin: auto;
            padding: 10mm;
            background: white;
            box-sizing: border-box;

            display: flex;
            flex-wrap: wrap;
            align-content: flex-start;
            gap: 2mm;
        }

        .etiqueta-card {
            border: 1px solid #000;
            box-sizing: border-box;
            padding: 5mm 6mm;

            display: flex;
            flex-direction: column;
            justify-content: space-between;

            page-break-inside: avoid;
            overflow: hidden;
            background: white;
        }

        .descricao {
            font-size: var(--fonte-descricao);
            font-weight: normal;
            text-transform: uppercase;
            line-height: 1.15;
            overflow: hidden;
        }

        .conteudo-etiqueta {
            display: grid;
            grid-template-columns: minmax(0, 1fr) max-content;
            grid-template-rows: auto auto;
            column-gap: 5mm;
            row-gap: 2mm;
            align-items: end;
        }

        .prateleira {
            grid-column: 1;
            grid-row: 1;
            font-size: var(--fonte-prateleira);
            font-weight: 900;
            line-height: 1.05;
            letter-spacing: 0.2px;
            white-space: nowrap;
            overflow: visible;
        }

        .codigo-venda {
            grid-column: 1;
            grid-row: 2;
            font-size: var(--fonte-codigo-venda);
            font-weight: normal;
            line-height: 1.1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .codigos-originais {
            grid-column: 2;
            grid-row: 1 / span 2;
            align-self: end;
            justify-self: end;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            max-width: 45mm;
            overflow: hidden;
        }

        .codigo-original {
            font-size: var(--fonte-codigo-original);
            font-weight: normal;
            line-height: 1.15;
            white-space: nowrap;
        }

        @media print {
            body {
                background: white;
            }

            .pagina-a4 {
                margin: 0;
                padding: 10mm;
            }

            .etiqueta-card {
                page-break-inside: avoid;
                break-inside: avoid;
            }
        }
    </style>
</head>
<body>
    <div class="pagina-a4">
<div class="etiqueta-card" style="
    width: 12.00cm;
    height: 6.00cm;
    --fonte-descricao: 18.00px;
    --fonte-prateleira: 21.00px;
    --fonte-codigo-venda: 18.00px;
    --fonte-codigo-original: 16.80px;
">
    <div class="descricao">
        CUBO DE SINCRONIZAÇÃO 54-24 DENTES
    </div>

    <div class="conteudo-etiqueta">
        <div class="prateleira">
            TESTE-01R - L1 - B002
        </div>

        <div class="codigo-venda">
            VD-TESTE-082
        </div>

        <div class="codigos-originais">
            <div class="codigo-original">1083 383 183-1</div>
<div class="codigo-original">1084 384 184-2</div>

        </div>
    </div>
</div>
<div class="etiqueta-card" style="
    width: 12.00cm;
    height: 6.00cm;
    --fonte-descricao: 18.00px;
    --fonte-prateleira: 21.00px;
    --fonte-codigo-venda: 18.00px;
    --fonte-codigo-original: 16.80px;
">
    <div class="descricao">
        ANEL SINC MERCEDES-BENZ
    </div>

    <div class="conteudo-etiqueta">
        <div class="prateleira">
            TESTE-01R - L0 - A001
        </div>

        <div class="codigo-venda">
            VD-TESTE-001
        </div>

        <div class="codigos-originais">
            <div class="codigo-original">1002 302 102-1</div>

        </div>
    </div>
</div>
    </div>
</body>
</html>
