services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: gerador_etiquetas
      POSTGRES_USER: gerador
      POSTGRES_PASSWORD: gerador123
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gerador -d gerador_etiquetas"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
