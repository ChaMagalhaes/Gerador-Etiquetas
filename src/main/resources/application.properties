spring.application.name=gerador-etiquetas

# A aplicacao usa JDBC puro (util/Conexao) para acessar o Postgres, nao o
# DataSource/JPA do Spring. Excluimos essas autoconfiguracoes para que o
# servidor web suba mesmo sem DB_URL/DB_USER/DB_PASSWORD definidos - a conexao
# so e aberta (e so pode falhar) quando um endpoint realmente consulta o banco.
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration,org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration,org.springframework.boot.autoconfigure.jdbc.DataSourceTransactionManagerAutoConfiguration